name: Daily Data Update and Deploy

on:
  schedule:
    # 台灣時間每天凌晨 4:00 (UTC 20:00) 執行更新
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # 讓您可以手動在網頁點擊執行

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas tabulate

      - name: Run Update Script
        run: |
          python scripts/update_financials.py
          python scripts/build_wikilink_index.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Pilot_Reports/ WIKILINKS.md
          git commit -m "Auto Update: Daily Financials $(date +'%Y-%m-%d')" || exit 0
          git push origin main
